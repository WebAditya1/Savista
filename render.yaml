# Savista UPVC — Backend (Render)
# Deploy: https://dashboard.render.com → New → Blueprint → connect repo
services:
  - type: web
    name: savista-api
    runtime: node
    rootDir: backend
    # NODE_ENV=production skips devDependencies; TypeScript is required to build.
    buildCommand: npm install --include=dev && npm run build
    # Seed is best-effort; API must start even if Atlas is not ready yet.
    startCommand: npm run seed:prod; npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEED_IF_EMPTY
        value: "true"
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: hello@savista.in
      - key: ADMIN_EMAIL
        sync: false
